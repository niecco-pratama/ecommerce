<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body id ="body">
    <p id ="paragraf">JENIS JENIS WARNA IPHONE</p>
    <button onclick="berubah()">i phone 17 pro</button>
    <button onclick="kembali()">i phone 17 pro max</button>
    <button onclick="warna()">i phone propromaxmaxmax</button>
    <p onmouseenter="kembali()" onmouseleave="warna()">jenis warna iphone</p>
    <script>
        body = document.getElementById("body");
        paragraf = document.getElementById("paragraf")
        berubah = () => {
            body.style.backgroundColor ="#FF6E00";
            paragraf.style.fontSize ="30px";
            paragraf.style.color ="white";

        };
        kembali = () => {
            body.style.backgroundColor ="#000A43";
            paragraf.style.fontSize ="30px";
        };
        warna = () => {
            body.style.backgroundColor ="#98FB98";
            paragraf.style.fontSize ="30px";
        };
        </script>
    
</body>
</html>
