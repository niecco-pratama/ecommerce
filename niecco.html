<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        .product-box {
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
            display: inline-block;
            text-align: center;
        }
        .product-box img {
            width: 100%;
            max-width: 150px;
            margin-bottom: 10px;
        }
        .buy-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        .buy-btn:hover {
            background-color: #45a049;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
    <script>
    let barang = [
        {nama:"celana", harga:"100000", gambar:"https://via.placeholder.com/150?text=Celana"},
        {nama:"jaket", harga:"100000000", gambar:"https://via.placeholder.com/150?text=Jaket"},
        {nama:"hoodie", harga:"100000000", gambar:"https://via.placeholder.com/150?text=Hoodie"},
        {nama:"sendal", harga:"100000000", gambar:"https://via.placeholder.com/150?text=Sendal"},
        {nama:"sepatu", harga:"100000000", gambar:"https://via.placeholder.com/150?text=Sepatu"},
    ];
    let hasil=barang.map((item) => {
       return`<div class="product-box"><img src="${item.gambar}" alt="${item.nama}">
            <h1>${item.nama}</h1>
            <h2>${item.harga}</h2>
            <button class="buy-btn">Beli Sekarang</button></div>
            `;
    });
    document.write('<div class="products">' + hasil.join('') + '</div>')
       
    </script>
</body>
</html>
